name: Build Console App

on: [push]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure and Build
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_RUNTIME_OUTPUT_DIRECTORY_RELEASE=. ..
          cmake --build . --config Release
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: github-search-win
          path: build/edu-github-fast-search.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev
      - name: Configure and Build
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make
      - name: Create DEB
        run: |
          mkdir -p package/usr/local/bin
          mkdir -p package/DEBIAN
          cp build/edu-github-fast-search package/usr/local/bin/
          echo "Package: edu-github-fast-search" > package/DEBIAN/control
          echo "Version: 1.0.0" >> package/DEBIAN/control
          echo "Architecture: amd64" >> package/DEBIAN/control
          echo "Maintainer: Developer" >> package/DEBIAN/control
          echo "Description: GitHub search tool" >> package/DEBIAN/control
          dpkg-deb --build package edu-github-fast-search.deb
      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: github-search-deb
          path: edu-github-fast-search.deb
